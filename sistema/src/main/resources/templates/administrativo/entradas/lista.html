<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="https://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.css" />
    <title>Cadastro de Entrada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Cadastro de entrada</title>
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <img src="https://cloud.omnix.co.id/logo.png" width="80" height="30" class="d-inline-block align-top" alt="">
        <a class="navbar-brand" href="#">Sistema</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Link</a>
                </li>
            </ul>
            <form class="form-inline my-2 my-lg-0">
                <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                <!-- ✅ Corrigido: "ligth" → "light" -->
                <button class="btn btn-outline-light my-2 my-sm-0" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">

        <table class="table" id="tabela">
            <thead>
                <tr>
                    <td>ID</td>
                    <td>Nome Fornecedor</td>
                    <td>Nome Fncionario</td>
                    <td>dataEntrada</td>
                    <td>ValorTotal</td>
                    <td>Opções</td>
                </tr>
            </thead>

            <tbody>
                <tr th:each="entrada: ${listaEntrada}">
                    <td th:text="${entrada.id}"></td>
                    <td th:text="${entrada.fornecedor.nome}"></td>
                    <td th:text="${entrada.funcionario.nome}"></td>
                    <td th:text="${entrada.dataEntrada}"></td>
                    <td th:text="${entrada.valorTotal}"></td>
                    <td colspan="2">
                        <a th:href="@{/editarEntrada/{id}(id=${entrada.id})}"><i class="fa-regular fa-pen-to-square"
                                style="color: rgb(116, 192, 252);"></i></a>
                        <form th:action="@{/removerEntrada/{id}(id=${entrada.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-link p-0">
                                <i class="fa-solid fa-trash-can" style="color: rgb(245, 16, 16);"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <!-- ✅ Corrigido: estrutura <a> e <button> estava invertida/mal formada -->
        <a href="/administrativo" class="btn btn-danger"><i class="fa-solid fa-arrow-right-from-bracket"
                style="color:(white);"></i>Voltar</a>
        <a href="/cadastroEntrada" class="btn btn-primary"><i class="fa-solid fa-cloud-arrow-down fa-fade"
                style="color:(white);"></i>Cadastrar</a>


    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"
        integrity="sha512-+k1pnlgt4F1H8L7t3z95o3/KO+o78INEcXTbnoJQ/F2VqDVhWoaiVml/OEHv9HsVgxUaVW+IbiZPUJQfF/YxZw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        $(document).ready(function () {
            $('#tabela').DataTable({
                language: {
                    url: 'https://cdn.datatables.net/plug-ins/2.3.2/i18n/pt-BR.json'
                }
            });
        });
    </script>

    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.js"></script>
</body>

</html>
