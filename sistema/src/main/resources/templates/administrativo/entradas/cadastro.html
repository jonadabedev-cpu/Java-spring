<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="https://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Cadastro de Entrada</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <img src="https://cloud.omnix.co.id/logo.png" width="80" height="30" class="d-inline-block align-top" alt="">
        <a class="navbar-brand" href="#">Sistema</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Link</a>
                </li>
            </ul>
            <form class="form-inline my-2 my-lg-0">
                <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">

                <button class="btn btn-outline-light my-2 my-sm-0" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">


        <form th:action="@{/salvarEntradas}" th:object="${entrada}" method="POST">
            <div class="form-group">


                <label for="id">ID:</label>
                <input type="text" readonly class="form-control" id="id" th:field="*{id}">


                <label>Observção:</label>
                <input type="text" required class="form-control" id="obs" th:field="*{obs}">


                <label>Funcionário:</label>
                <select th:field="*{funcionario}" class="form-control">
                    <option th:each="est : ${listaFuncionario}" th:value="${est.id}" th:text="${est.nome}"></option>
                </select>

                <label>Fornecedores:</label>
                <select th:field="*{fornecedor}" class="form-control">
                    <option th:each="est : ${listaFornecedor}" th:value="${est.id}" th:text="${est.nome}"></option>
                </select>

                <label>Quantidade Total:</label>
                <input type="text" readonly="readonly" class="form-control" id="obs" th:field="*{valorTotal}">

                <label>Valor Total:</label>
                <input type="text" readonly="readonly" class="form-control" id="obs" th:field="*{quantidadeTotal}">

                <!-- Começa itemEntrada abaixo-->
                <div class="form-row" th:object="${itemEntrada}">

                    <label>Produto:</label>
                    <select th:field="*{produto}" class="form-control">
                        <option th:each="est : ${listaProduto}" th:value="${est.id}" th:text="${est.nome}"></option>
                    </select>

                    <label>Quantidade:</label>
                    <input type="text" class="form-control" id="obs" th:field="*{quantidade}">

                    <label>Valor De Custo:</label>
                    <input type="text" class="form-control" id="obs" th:field="*{valor}">
                    
                    <label>Valor De Venda:</label>
                    <input type="text" class="form-control" id="obs" th:field="*{valor}">

                    <button name="acao" th:value="itens" type="submit" class="btn btn-primary">Adicionar</button>
                </div>
            </div>
            <!--Tabela com os itens-->
            <table class="table" id="tabela">
            <thead>
                <tr>
                    <td>ID</td>
                    <td>Produto</td>
                    <td>Quantidade</td>
                    <td>Valor Custo</td>
                    <td>Valor Venda</td>
                    <td>Ação</td>
                </tr>
            </thead>

            <tbody>
                <tr th:each="itemEntrada: ${listaItemEntrada}">
                    <td th:text="${itemEntrada.id}"></td>
                    <td th:text="${itemEntrada.produto.nome}"></td>
                    <td th:text="${itemEntrada.quantidade}"></td>
                    <td th:text="${itemEntrada.valorCusto}"></td>
                    <td th:text="${itemEntrada.valor}"></td>
                    <td colspan="2">
                        <a th:href="@{/editarItemEntrada/{id}(id=${itemEntrada.id})}"><i class="fa-regular fa-pen-to-square"
                                style="color: rgb(116, 192, 252);"></i></a>
                        <a th:href="@{/removerItemEntrada/{id} (id=${itemEntrada.id})}"><i class="fa-solid fa-trash-can"
                                style="color: rgb(245, 16, 16);"></i></a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>




    </div>


    <button type="submit" name="acao" th:value="salvar" class="btn btn-primary"><i class="fa-solid fa-cloud-arrow-down fa-fade"
            style="color:(white);"></i> Salvar</button>
    <a href="/administrativo" class="btn btn-danger"><i class="fa-solid fa-arrow-right-from-bracket"
            style="color:(white);"></i>Voltar</a>
    <a href="/listaEntrada" class="btn btn-success"><i class="fa-solid fa-list" style="color: (white);"></i>Listar</a>
    </form>

    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"
        integrity="sha512-pHVGpX7F/27yZ0ISY+VVjyULApbDlD0/X0rgGbTqCE7WFW5MezNTWG/dnhtbBuICzsd0WQPgpE4REBLv+UqChw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        $(document).ready(function () {
            $('#cep').mask('99.999-999');
        });
    </script>
</body>

</html>
