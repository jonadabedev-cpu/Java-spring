<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Cadastro de Estado</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <a class="navbar-brand" href="#">Sistema</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item"><a class="nav-link" href="/administrativo">Home</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-3"><i class="fa-solid fa-map"></i> Cadastro de Estado</h4>

    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form th:action="@{/salvarEstados}" th:object="${estado}" method="POST">
        <div class="form-group">
            <label>ID:</label>
            <input type="text" readonly class="form-control" th:field="*{id}">
        </div>
        <div class="form-group">
            <label>Nome do Estado:</label>
            <input type="text" required class="form-control" th:field="*{nome}">
        </div>
        <div class="form-group">
            <label>Sigla:</label>
            <input type="text" required class="form-control" th:field="*{sigla}" maxlength="2">
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-cloud-arrow-down"></i> Salvar
        </button>
        <a href="/administrativo" class="btn btn-danger">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Voltar
        </a>
        <a href="/listaEstado" class="btn btn-success">
            <i class="fa-solid fa-list"></i> Listar
        </a>
    </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
</body>
</html>
