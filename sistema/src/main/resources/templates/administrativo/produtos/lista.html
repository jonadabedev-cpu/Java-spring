<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Lista de Produtos</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <a class="navbar-brand" href="#">Sistema</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item"><a class="nav-link" href="/administrativo">Home</a></li>
        </ul>
    </div>
</nav>

<div class="container-fluid mt-4">
    <h4 class="mb-3"><i class="fa-solid fa-box"></i> Lista de Produtos</h4>

    <table class="table table-bordered table-striped" id="tabela">
        <thead class="thead-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Cód. Barras</th>
                <th>Unid. Medida</th>
                <th>Estoque</th>
                <th>Custo</th>
                <th>Venda</th>
                <th>Lucro</th>
                <th>Margem %</th>
                <th>Cidade</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="produto : ${listaProduto}">
                <td th:text="${produto.id}"></td>
                <td th:text="${produto.nome}"></td>
                <td th:text="${produto.codigoBarras}"></td>
                <td th:text="${produto.unidadeMedida}"></td>
                <td th:text="${produto.estoque}"></td>
                <td th:text="${#numbers.formatDecimal(produto.precoCusto, 1, 'POINT', 2, 'COMMA')}"></td>
                <td th:text="${#numbers.formatDecimal(produto.precoVenda, 1, 'POINT', 2, 'COMMA')}"></td>
                <td th:text="${#numbers.formatDecimal(produto.lucro, 1, 'POINT', 2, 'COMMA')}"></td>
                <td th:text="${produto.margemLucro}"></td>
                <td th:text="${produto.cidade?.nome}"></td>
                <td>
                    <a th:href="@{/editarProduto/{id}(id=${produto.id})}">
                        <i class="fa-regular fa-pen-to-square" style="color: rgb(116, 192, 252);"></i>
                    </a>
                    <form th:action="@{/removerProduto/{id}(id=${produto.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-link p-0">
                            <i class="fa-solid fa-trash-can" style="color: rgb(245, 16, 16);"></i>
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <a href="/administrativo" class="btn btn-danger">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Voltar
    </a>
    <a href="/cadastroProduto" class="btn btn-primary">
        <i class="fa-solid fa-plus"></i> Cadastrar
    </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.datatables.net/2.3.8/js/dataTables.js"></script>
<script>
    $(document).ready(function () {
        $('#tabela').DataTable({ language: { url: 'https://cdn.datatables.net/plug-ins/2.3.2/i18n/pt-BR.json' } });
    });
</script>
</body>
</html>
