<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Cadastro de Produto</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <img src="https://cloud.omnix.co.id/logo.png" width="80" height="30" class="d-inline-block align-top" alt="">
        <a class="navbar-brand" href="#">Sistema</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                </li>
            </ul>
            <form class="form-inline my-2 my-lg-0">
                <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-light my-2 my-sm-0" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <form th:action="@{/salvarProduto}" th:object="${produto}" method="POST">
            <div class="form-group">

                <div class="row">
                    <div class="col-md">
                        <label for="id">ID:</label>
                        <input type="text" readonly class="form-control" id="id" th:field="*{id}">
                    </div>
                    <div class="col-md">
                        <label>Nome do Produto:</label>
                        <input type="text" required class="form-control" th:field="*{nome}">
                    </div>
                    <div class="col-md">
                        <label>Código de Barras:</label>
                        <input type="text" required class="form-control" th:field="*{codigoBarras}"> <!-- ✅ era codigodebarras -->
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md">
                        <label>Unidade de Medida:</label>
                        <input type="text" required class="form-control" th:field="*{unidadeMedida}"> <!-- ✅ era unidademedia -->
                    </div>
                    <div class="col-md">
                        <label>Estoque:</label>
                        <input type="text" required class="form-control" th:field="*{estoque}">
                    </div>
                    <div class="col-md">
                        <label>Preço de Custo:</label>
                        <input type="text" required class="form-control" th:field="*{precoCusto}"> <!-- ✅ era precodecusto -->
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md">
                        <label>Preço de Venda:</label>
                        <input type="text" required class="form-control" th:field="*{precoVenda}"> <!-- ✅ era precodevenda -->
                    </div>
                    <div class="col-md">
                        <label>Lucro:</label>
                        <input type="text" required class="form-control" th:field="*{lucro}">
                    </div>
                    <div class="col-md">
                        <label>Margem de Lucro:</label>
                        <input type="text" required class="form-control" th:field="*{margemLucro}"> <!-- ✅ era margemlucro -->
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md">
                        <label>Cidade:</label>
                        <select th:field="*{cidade}" class="form-control">
                            <option th:each="cidade : ${listaCidade}"
                                    th:value="${cidade.id}"
                                    th:text="${cidade.nome}"></option>
                        </select>
                    </div>
                </div>

            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-cloud-arrow-down fa-fade"></i> Salvar
                </button>
                <a href="/administrativo" class="btn btn-danger">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Voltar
                </a>
                <a href="/listaProduto" class="btn btn-success">
                    <i class="fa-solid fa-list"></i> Listar
                </a>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
</body>
</html>
